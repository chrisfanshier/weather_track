name: Paper Trader

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

concurrency:
  group: paper-trader
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ENABLE_CSV_EXPORT: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper trader cycle
        run: python weather_trade_agent.py

      - name: Commit paper logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/paper/
          git diff --staged --quiet || git commit -m "paper: $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main
          git push
